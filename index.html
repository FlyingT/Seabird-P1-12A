<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Web app for printing labels on the Seabird P1-12A Bluetooth thermal printer">
  <title>Seabird Label Printer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Roboto:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-container">

  <!-- Header -->
  <header class="app-header">
    <h1>🏷️ Seabird Label Printer</h1>
    <p class="subtitle">P1-12A Thermal Printer – Web Bluetooth</p>
  </header>

  <!-- Connection Bar -->
  <div class="connection-bar">
    <div class="status-row">
      <div id="status-dot" class="status-dot disconnected"></div>
      <span id="status-text" class="status-text">Not connected</span>
    </div>
    <div class="conn-actions">
      <button id="connect-btn" class="btn btn-primary btn-sm">
        <span>⚡</span> Connect
      </button>
      <button id="disconnect-btn" class="btn btn-danger btn-sm hidden">
        <span>✕</span> Disconnect
      </button>
    </div>
  </div>

  <!-- Label Preview -->
  <section class="panel preview-panel">
    <div class="panel-header">
      <span class="panel-title">📐 Preview</span>
      <span class="preview-hint">Original size × 3</span>
    </div>
    <div id="preview-wrap" class="preview-wrap">
      <canvas id="label-canvas" width="300" height="96"></canvas>
    </div>
    <div class="print-direction">
      <span>⬅ Print direction</span>
      <span class="direction-detail">Left = label start &nbsp;|&nbsp; Right = label end</span>
    </div>
  </section>

  <!-- Editor Controls -->
  <section class="panel editor-panel">
    <div class="panel-header">
      <span class="panel-title">✏️ Edit Label</span>
    </div>
    <div class="panel-body editor-grid">

      <!-- Text Input -->
      <div class="field full-width">
        <label for="label-text">Text</label>
        <textarea id="label-text" rows="2" placeholder="Enter label text...">Hello World!</textarea>
      </div>

      <!-- Font -->
      <div class="field">
        <label for="font-select">Font</label>
        <select id="font-select">
          <option value="Inter" selected>Inter</option>
          <option value="Roboto">Roboto</option>
          <option value="Roboto Mono">Roboto Mono</option>
          <option value="JetBrains Mono">JetBrains Mono</option>
          <option value="Arial">Arial</option>
          <option value="Arial Black">Arial Black</option>
          <option value="Verdana">Verdana</option>
          <option value="Georgia">Georgia</option>
          <option value="Times New Roman">Times New Roman</option>
          <option value="Courier New">Courier New</option>
        </select>
      </div>

      <!-- Font Size -->
      <div class="field">
        <label for="font-size">Size: <span id="font-size-val">32px</span></label>
        <input type="range" id="font-size" min="8" max="80" value="32" step="1">
      </div>

      <!-- Alignment + Bold -->
      <div class="field">
        <label>Alignment</label>
        <div class="btn-group">
          <button class="align-btn" data-align="left" title="Left">◧</button>
          <button class="align-btn active" data-align="center" title="Center">◫</button>
          <button class="align-btn" data-align="right" title="Right">◨</button>
          <button id="bold-toggle" class="align-btn" title="Bold">B</button>
        </div>
      </div>

      <!-- Padding -->
      <div class="field">
        <label for="label-padding">Padding (px)</label>
        <input type="number" id="label-padding" value="12" min="0" max="50" step="1">
      </div>

    </div>
  </section>

  <!-- Print Controls -->
  <section class="panel print-panel">
    <div class="panel-body print-row">
      <div class="field compact">
        <label for="copies">Copies</label>
        <input type="number" id="copies" value="1" min="1" max="99" step="1">
      </div>
      <button id="print-btn" class="btn btn-print" disabled>
        🖨️ Print
      </button>
    </div>
    <div id="progress-bar" class="progress-bar hidden">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <div id="print-status" class="print-status hidden"></div>
  </section>

  <!-- Footer -->
  <footer class="app-footer">
    <a href="explorer.html" class="footer-link">🔍 BLE Explorer (Debug)</a>
    <span class="version">v0.0.4</span>
  </footer>

</div>

<script src="printer.js"></script>
<script src="app.js"></script>
</body>
</html>
